schema_version: 1.0.0
dashboard_title: Henipavirus Vaccine Development Pathway Dashboard
generated_seed_date: '2026-06-10'
curation_policy:
  highest_supported_stage: Rows are placed in the highest maturity stage supported by public evidence.
  human_vs_veterinary: Human and veterinary indications are separated in notes; veterinary licensure is not human licensure.
  gap_definition: Gap lanes mean no public pathway was identified from configured sources, not proof of unpublished absence.
  auto_update_scope: Automation refreshes registry metadata, source availability, source titles, and review flags; it does
    not silently promote curated stages without human review.
stage_definitions:
- key: gap
  label: No dedicated clinical pathway
  order: 0
  description: No public target-specific vaccine pathway found; source-backed gap lane, not evidence of unpublished absence.
  css_class: stage-gap
- key: surveillance
  label: Discovery / surveillance
  order: 1
  description: Virus discovery, receptor/tropism, taxonomy, or risk-characterization work without a vaccine candidate.
  css_class: stage-surveillance
- key: preclinical
  label: Preclinical efficacy / platform evidence
  order: 2
  description: Animal or platform evidence, including challenge-model protection, without verified human clinical entry.
  css_class: stage-preclinical
- key: phase1
  label: Phase 1 / first-in-human
  order: 3
  description: First-in-human or early clinical development publicly scheduled, registered, or underway.
  css_class: stage-phase1
- key: phase1_complete
  label: Phase 1 complete / immune-bridge work
  order: 4
  description: Phase 1 completed or published; next work is dose selection, bridging, or affected-area development.
  css_class: stage-phase1_complete
- key: phase2
  label: Phase 2 / affected-area trial
  order: 5
  description: Mid-stage or affected-area clinical testing is funded, planned, registered, or launched.
  css_class: stage-phase2
- key: reserve
  label: Reserve / emergency-use readiness
  order: 6
  description: Investigational reserve or outbreak-readiness manufacturing exists, distinct from licensure.
  css_class: stage-reserve
- key: licensed
  label: Licensed / One Health deployment
  order: 7
  description: Licensed/deployed product in its stated indication; veterinary rows are not human licensure.
  css_class: stage-licensed
