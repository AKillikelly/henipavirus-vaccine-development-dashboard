name: Update and publish dashboard

on:
  workflow_dispatch:
    inputs:
      skip_network:
        description: Build from curated data without checking external sources
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  schedule:
    # Automatically update every Monday at 07:23 UTC
    - cron: "23 7 * * 1"

  push:
    paths:
      - "docs/**"
      - "config/**"
      - "scripts/**"
      - "requirements.txt"
      - ".github/workflows/update-and-publish.yml"

permissions:
  actions: read
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Refresh dashboard data
        shell: bash
        env:
          SKIP_NETWORK: ${{ github.event.inputs.skip_network || 'false' }}
        run: |
          set -euo pipefail

          EXTRA_ARGS=()

          if [ "$SKIP_NETWORK" = "true" ]; then
            EXTRA_ARGS+=(--skip-network)
          fi

          python scripts/update_dashboard_data.py \
            --config config/pipeline.yml \
            --rules config/watch_rules.yml \
            --out docs/data \
            --reports reports \
            "${EXTRA_ARGS[@]}"

      - name: Validate and build dashboard
        run: |
          python scripts/validate_dashboard_data.py \
            --data docs/data/henipavirus_development_pipeline_data.json

          python scripts/build_site.py --site docs

      - name: Commit refreshed data
        if: >-
          (github.event_name == 'schedule' ||
          github.event_name == 'workflow_dispatch') &&
          github.ref_name == github.event.repository.default_branch
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/data reports/update_report.md

          if git diff --cached --quiet; then
            echo "No generated data changes to commit."
          else
            git commit -m "Update Henipavirus dashboard data [skip ci]"
            git push
          fi

      - name: Configure GitHub Pages
        if: github.ref_name == github.event.repository.default_branch
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        if: github.ref_name == github.event.repository.default_branch
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

  deploy:
    if: github.ref_name == github.event.repository.default_branch
    needs: update-build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
